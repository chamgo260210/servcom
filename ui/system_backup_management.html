<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>시스템 백업 관리</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>

<body class="app-loading" data-home="html/dashboard.html" data-domain="FULL">
  <div id="app-shell-loader" class="app-shell-loader">
    <div class="spinner" aria-label="로딩 중"></div>
    <div class="muted">필요한 정보를 불러오는 중...</div>
  </div>
  <header class="header">
    <div class="header-left">
      <button class="icon-btn" id="sidebar-toggle" aria-label="메뉴 열기">☰</button>
      <div class="logo"><img src="assets/logo.png" width="32" alt="logo" /> 시스템 백업 관리</div>
    </div>
    <div class="header-right">
      <div class="system-status-badge inline" id="status-card">
        <div class="status-label">연결 상태</div>
        <div class="system-status">
          <span id="server-status" class="status-chip status-pending"><span class="status-dot"></span><span class="status-text">서버 확인 중</span></span>
          <span id="db-status" class="status-chip status-pending"><span class="status-dot"></span><span class="status-text">DB 확인 중</span></span>
        </div>
        <div class="status-meta" id="status-meta">상태 체크 중...</div>
      </div>
      <button class="btn tiny muted theme-toggle" id="theme-toggle" type="button" aria-pressed="false"><span class="theme-icon">◐</span><span id="theme-label">라이트 모드</span></button>
      <span id="session-countdown" class="status-chip session-timer"></span>
      <button class="btn tiny secondary" id="extend-session" style="display:none;">세션 연장</button>
      <div class="muted">안녕하세요, <span id="user-name"></span> (<span id="user-role"></span>)</div>
      <button class="btn muted" id="logout-btn">로그아웃</button>
    </div>
  </header>
  <div class="page">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-title">시스템</div>
      <a class="nav-link" data-page="dashboard" href="html/dashboard.html">대시보드</a>
      <a class="nav-link" data-page="history" data-min-role="MASTER" href="html/history.html">변경 이력</a>
      <div class="nav-divider"></div>
    </nav>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <main class="content">
      <section class="card">
        <div class="card-title" id="domain-title">시스템 백업</div>
        <p class="muted" id="domain-subtitle"></p>
        <p class="form-message error">FULL 백업은 사용자와 인증 정보를 포함할 수 있으므로 다운로드와 업로드 복원은 제공하지 않습니다.</p>
      </section>
      <section class="card">
        <div class="card-title">FULL 백업 생성</div>
        <div class="stack">
          <label for="backup-description">설명</label>
          <input id="backup-description" placeholder="선택 입력" />
          <button class="btn" id="create-backup" type="button">FULL 백업 생성</button>
          <div id="backup-message" class="form-message" role="alert" aria-live="polite"></div>
        </div>
      </section>
      <section class="card">
        <div class="card-title">백업 목록</div>
        <div id="validation-result" class="form-message" role="alert" aria-live="polite"></div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>파일명</th><th>크기</th><th>생성일</th><th>상태</th><th>설명</th><th>작업</th></tr></thead>
            <tbody id="backup-list"><tr><td colspan="6" class="muted">불러오는 중...</td></tr></tbody>
          </table>
        </div>
      </section>
      <section class="card">
        <div class="card-title">복원 이력 / 복원 전 지점</div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>모드</th><th>상태</th><th>시작</th><th>완료</th><th>Restore point</th><th>오류</th></tr></thead>
            <tbody id="restore-list"><tr><td colspan="6" class="muted">불러오는 중...</td></tr></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="js/domain_data_management.js"></script>
</body>

</html>
