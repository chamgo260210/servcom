<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>데이터 관리</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>

<body class="app-loading" data-home="html/dashboard.html">
  <div id="app-shell-loader" class="app-shell-loader">
    <div class="spinner" aria-label="로딩 중"></div>
    <div class="muted">필요한 정보를 불러오는 중...</div>
  </div>
  <header class="header">
    <div class="header-left">
      <button class="icon-btn" id="sidebar-toggle" aria-label="메뉴 열기">☰</button>
      <div class="logo"><img src="assets/logo.png" width="32" alt="logo" /> 데이터 관리</div>
    </div>
    <div class="header-right">
      <div class="system-status-badge inline" id="status-card">
        <div class="status-label">연결 상태</div>
        <div class="system-status">
          <span id="server-status" class="status-chip status-pending">
            <span class="status-dot"></span>
            <span class="status-text">서버 확인 중</span>
          </span>
          <span id="db-status" class="status-chip status-pending">
            <span class="status-dot"></span>
            <span class="status-text">DB 확인 중</span>
          </span>
        </div>
        <div class="status-meta" id="status-meta">상태 체크 중...</div>
      </div>
      <button class="btn tiny muted theme-toggle" id="theme-toggle" type="button" aria-pressed="false">
        <span class="theme-icon">◐</span>
        <span id="theme-label">라이트 모드</span>
      </button>
      <span id="session-countdown" class="status-chip session-timer"></span>
      <button class="btn tiny secondary" id="extend-session" style="display:none;">세션 연장</button>
      <div class="muted">안녕하세요, <span id="user-name"></span> (<span id="user-role"></span>)</div>
      <button class="btn muted" id="logout-btn">로그아웃</button>
    </div>
  </header>
  <div class="page">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-title">탐색</div>
      <a class="nav-link" data-page="dashboard" href="html/dashboard.html">대시보드</a>
      <a class="nav-link" data-page="overview" href="html/schedule_overview.html">근무 배정표</a>
      <a class="nav-link" data-page="profile" href="html/member_profile.html">내 프로필</a>
      <a class="nav-link" data-page="requests" data-roles="MASTER,MEMBER" href="html/request_center.html">근무 변경 신청</a>
      <a class="nav-link" data-page="approvals" data-roles="MASTER,OPERATOR" href="html/request_approvals.html">변경 승인함</a>
      <a class="nav-link" data-page="notices" href="html/notice_board.html">공지사항</a>
      <a class="nav-link" data-page="notice_admin" data-min-role="OPERATOR" href="html/notice_admin.html">공지 관리</a>
      <a class="nav-link" data-page="members" data-min-role="OPERATOR" href="html/admin_members.html">구성원 관리</a>
      <a class="nav-link" data-page="shifts" data-min-role="OPERATOR" href="html/admin_shifts.html">근무 관리</a>
      <a class="nav-link" data-page="history" data-min-role="MASTER" href="html/history.html">변동 이력</a>
      <a class="nav-link" data-page="data-management" data-min-role="OPERATOR" href="data_management.html">데이터 관리</a>
      <div class="nav-divider"></div>
      <div class="nav-section-label">통계 센터</div>
      <a class="nav-link" data-page="visitor-portal" href="html/visitor_dashboard.html">출입 통계 바로가기</a>
      <a class="nav-link" data-page="serials-portal" href="html/serials_home.html">연속간행물 센터 바로가기</a>
    </nav>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <main class="content">
      <div class="grid two">
        <section class="card">
          <div class="card-title">JSON 백업 생성</div>
          <div class="stack">
            <label for="backup-domain">백업 범위</label>
            <select id="backup-domain">
              <option value="VISITORS">방문자 통계</option>
              <option value="SERIALS">연속간행물</option>
              <option value="FULL" data-master-only="true" hidden>전체 데이터</option>
              <option value="WORK" data-master-only="true" hidden>근무 데이터</option>
            </select>
            <label for="backup-description">설명</label>
            <input id="backup-description" placeholder="선택 입력" />
            <button class="btn" id="create-backup" type="button">백업 생성</button>
            <div id="backup-message" class="form-message" role="alert" aria-live="polite"></div>
          </div>
        </section>
        <section class="card">
          <div class="card-title">Excel 추출</div>
          <div class="stack">
            <label for="visitor-academic-year">방문자 학년도</label>
            <input id="visitor-academic-year" type="number" min="2000" max="2100" placeholder="2026" />
            <div class="actions">
              <button class="btn" id="export-visitors" type="button">방문자 Excel</button>
              <button class="btn secondary" id="export-serials" type="button">연속간행물 Excel</button>
            </div>
            <div id="export-message" class="form-message" role="alert" aria-live="polite"></div>
          </div>
        </section>
        <section class="card">
          <div class="card-title">파일 가져오기</div>
          <div class="stack">
            <label for="upload-backup-file">JSON 백업 파일</label>
            <input id="upload-backup-file" type="file" accept=".json,application/json" />
            <div class="actions">
              <button class="btn secondary" id="upload-validate" type="button">업로드 검증</button>
              <button class="btn" id="upload-restore" type="button" style="display:none;" disabled>업로드 복원</button>
            </div>
            <div id="upload-message" class="form-message" role="alert" aria-live="polite"></div>
          </div>
        </section>
      </div>
      <section class="card">
        <div class="card-title">백업 목록</div>
        <div id="validation-result" class="form-message" role="alert" aria-live="polite"></div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>범위</th>
                <th>파일명</th>
                <th>크기</th>
                <th>생성일</th>
                <th>상태</th>
                <th>작업</th>
              </tr>
            </thead>
            <tbody id="backup-list">
              <tr><td colspan="6" class="muted">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
      <section class="card" id="restore-history-card" style="display:none;">
        <div class="card-title">복원 이력</div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>범위</th>
                <th>모드</th>
                <th>상태</th>
                <th>시작</th>
                <th>완료</th>
              </tr>
            </thead>
            <tbody id="restore-list">
              <tr><td colspan="5" class="muted">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="js/data_management.js"></script>
</body>

</html>
